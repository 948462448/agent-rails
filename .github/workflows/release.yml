name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag and main ancestry
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk 'NF { print $1; exit }' VERSION)"
          if [[ "$GITHUB_REF_NAME" != "v$version" ]]; then
            printf 'Tag %s does not match VERSION %s.\n' "$GITHUB_REF_NAME" "$version" >&2
            exit 1
          fi
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            printf 'Release commit %s is not contained in origin/main.\n' "$GITHUB_SHA" >&2
            exit 1
          fi

      - name: Run test suite
        run: bash tests/run.sh

      - name: Build release assets
        run: bash scripts/build-release.sh --output dist

      - name: Verify release checksum
        working-directory: dist
        run: sha256sum -c agent-rails.tar.gz.sha256

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/agent-rails.tar.gz \
            dist/agent-rails.tar.gz.sha256 \
            dist/install.sh \
            --verify-tag \
            --generate-notes \
            --title "Agent Rails $GITHUB_REF_NAME"
