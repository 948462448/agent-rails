name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag and main ancestry
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk 'NF { print $1; exit }' VERSION)"
          if [[ "$GITHUB_REF_NAME" != "v$version" ]]; then
            printf 'Tag %s does not match VERSION %s.\n' "$GITHUB_REF_NAME" "$version" >&2
            exit 1
          fi
          git fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            printf 'Release commit %s is not contained in origin/main.\n' "$GITHUB_SHA" >&2
            exit 1
          fi

      - name: Run test suite
        run: bash tests/run.sh

      - name: Build release assets
        run: AGENT_RAILS_HOME="$PWD" python3 -I scripts/agent-python-cli.py release-build --output dist

      - name: Smoke test built release
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk 'NF { print $1; exit }' VERSION)"
          smoke_root="$(mktemp -d)"
          trap 'rm -rf "$smoke_root"' EXIT
          tar -xzf dist/agent-rails.tar.gz -C "$smoke_root"
          release_home="$smoke_root/agent-rails-$version"
          project="$smoke_root/project"
          installer_smoke="$smoke_root/installer"
          mkdir -p "$project"
          mkdir -p "$installer_smoke"
          cp dist/install.sh dist/release_install.py "$installer_smoke/"
          installer_output="$(cd "$installer_smoke" && bash ./install.sh --dry-run)"
          if [[ "$installer_output" != *"Would download:"* || "$installer_output" != *"Would verify:"* ]]; then
            printf 'Built standalone installer assets did not run together.\n' >&2
            printf '%s\n' "$installer_output" >&2
            exit 1
          fi
          git -C "$project" init -q
          env -u AGENT_RAILS_HOME "$release_home/bin/agent-rails" --version
          output="$(
            env -u AGENT_RAILS_HOME \
              "$release_home/bin/agent-rails" update \
                --project "$project" \
                --tool opencode \
                --skip-pull \
                --dry-run
          )"
          if [[ "$output" != *"Skip source test suite for verified Release installation."* ]]; then
            printf 'Built release did not use the Release update path.\n' >&2
            printf '%s\n' "$output" >&2
            exit 1
          fi
          if [[ "$output" != *"opencode install --project"* || "$output" != *"opencode doctor --project"* ]]; then
            printf 'Built release did not dispatch OpenCode maintenance correctly.\n' >&2
            printf '%s\n' "$output" >&2
            exit 1
          fi

      - name: Verify release checksum
        working-directory: dist
        run: sha256sum -c agent-rails.tar.gz.sha256

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/agent-rails.tar.gz \
            dist/agent-rails.tar.gz.sha256 \
            dist/install.sh \
            dist/release_install.py \
            --verify-tag \
            --generate-notes \
            --title "Agent Rails $GITHUB_REF_NAME"
